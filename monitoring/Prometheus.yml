global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'minio'
    static_configs:
      - targets: ['minio_lake:9000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_dw:5432']